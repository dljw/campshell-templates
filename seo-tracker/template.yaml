      searchVolume: 2400
      difficulty: 45
      intent: commercial
      status: tracking
    - term: "getting started guide"
      pageId: "$ref:pages[1]"
      position: 5
      previousPosition: 8
      searchVolume: 1800
      difficulty: 30
      intent: informational
      status: tracking
    - term: "beginner tips"
      pageId: "$ref:pages[2]"
      searchVolume: 3200
      difficulty: 25
      intent: informational
      status: tracking
      notes: "Page still in drafting"

  backlinks:
    - sourceDomain: techblog.example.com
      sourceUrl: https://techblog.example.com/best-tools-2026
      targetPageId: "$ref:pages[0]"
      anchorText: "great product management tool"
      linkType: dofollow
      domainAuthority: 62
      dateDiscovered: "2026-01-20"
