    - title: "Atomic Habits"
      type: book
      status: published
      author: James Clear
      rating: 9
      date: "2026-03-15"
      tagIds: ["$ref:tags[0]", "$ref:tags[2]"]
      linkedNoteIds: ["$ref:notes[0]"]
      content: |
        ## Key Themes

        - **Habit stacking**: Link new habits to existing routines
        - **The 1% rule**: Small daily improvements compound into remarkable results
        - **Identity-based habits**: Focus on who you want to become, not what you want to achieve
        - **Environment design**: Make good habits obvious and bad habits invisible

        ## Favorite Quotes

        > "You do not rise to the level of your goals. You fall to the level of your systems."

        > "Every action you take is a vote for the type of person you wish to become."

        > "The most effective way to change your habits is to focus not on what you want to achieve, but on who you wish to become."

        ## Chapter Notes

        ### Ch 1 — The Surprising Power of Atomic Habits
        Habits are the compound interest of self-improvement. Getting 1% better every day = 37x improvement in a year. The key insight: focus on trajectory, not current results.

        ### Ch 2 — How Your Habits Shape Your Identity
        Three layers of behavior change: outcomes, processes, identity. Most people focus on outcomes. The most effective approach starts with identity — decide who you want to be, then prove it with small wins.

        ### Ch 3 — How to Build Better Habits in 4 Simple Steps
        The habit loop: cue, craving, response, reward. The Four Laws of Behavior Change map to each stage:
        1. Make it obvious (cue)
        2. Make it attractive (craving)
        3. Make it easy (response)
        4. Make it satisfying (reward)

        ## Personal Takeaways
        Immediately applicable. Started habit stacking my reading habit onto my morning coffee routine. The identity framing is the most powerful idea — "I am someone who reads every day" vs "I want to read more books."
      summary: Excellent practical guide to building good habits through small changes, identity shifts, and environment design. Highly recommended.

    - title: The Zettelkasten Method
      type: research
      status: published
      source: "https://zettelkasten.de/introduction/"
      tagIds: ["$ref:tags[1]", "$ref:tags[0]"]
      linkedNoteIds: ["$ref:notes[0]"]
      rating: 9
      content: |
        ## Overview

        Zettelkasten (German for "slip box") is a knowledge management method developed by sociologist Niklas Luhmann. He used it to produce over 70 books and 400 articles over his lifetime.

        ## Core Principles

        ### Atomic Notes
        Each note captures one idea only — no sprawling summaries. Atomic notes are easier to link and reuse.

        ### Unique IDs
        Every note gets a permanent, unique identifier. This decouples the note's location from its content and makes links stable.

        ### Links Over Hierarchy
        Instead of filing notes into folders (which forces premature categorization), notes are linked to related ideas. A network of notes emerges organically.

        ### The Principle of Atomicity
        - Write in your own words — forces genuine understanding
        - One idea per note — keep it short and focused
        - Link liberally — connections are the value

        ## Why It Works

        Luhmann described his Zettelkasten as a "conversation partner" — when returning to old notes, unexpected connections surface. The system generates insights that no single note contains.

        ## Relevance to Brain Vault

        Brain Vault's architecture is a natural digital Zettelkasten:
        - File-per-note = permanent, addressable records
        - `linkedNoteIds` = wikilink-style connections
        - Tags provide lightweight categorization without locking notes into folders
        - Real-time dashboard = instant visibility into the knowledge graph
      summary: Zettelkasten is a note-taking method based on atomic, linked notes. Brain Vault's file-per-note + linkedNoteIds model implements the same principles digitally.
