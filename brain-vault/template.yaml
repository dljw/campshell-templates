name: brain-vault
displayName: Brain Vault
emoji: "\U0001F4D3"
category: knowledge
description: A personal knowledge base where every idea is a note — capture daily journals, meeting notes, book reviews, and research in one place

entities:
  notes:
    storage: one-per-file
    layout: table-detail
    fields:
      title:
        type: string
        required: true
        max: 300
        description: Note title
      content:
        type: string
        max: 100000
        description: Markdown body — the main content of the note
      type:
        type: enum
        values: [daily, meeting, project, book, article, research, reference, general]
        description: What kind of note this is — determines which fields are relevant
      status:
        type: enum
        values: [draft, in-progress, review, published, archived]
      tagIds:
        type: ref[]
        entity: tags
        max_items: 20
        description: Tags for organization and filtering
      linkedNoteIds:
        type: ref[]
        entity: notes
        max_items: 50
        description: Wikilink-style connections to other notes
      source:
        type: string
        max: 2000
        description: URL or citation for source material
      author:
        type: string
        max: 200
        description: Author of the source (for books, articles, papers)
      date:
        type: date
        description: Relevant date (meeting date, daily note date, publish date)
      rating:
        type: integer
        min: 0
        max: 10
        description: Personal rating or importance (0-10)
      summary:
        type: string
        max: 2000
        description: Brief abstract or TL;DR
      participants:
        type: string[]
        max_items: 20
        description: Attendees (for meetings) or collaborators
      actionItems:
        type: object[]
        items:
          task:
            type: string
            max: 500
          owner:
            type: string
            max: 100
          done:
            type: boolean
        description: Action items with owner and completion status
      pinned:
        type: boolean
        description: Pin important notes to the top

  tags:
    storage: collection
    file: tags.json
    fields:
      name:
        type: string
        required: true
        max: 50
        description: Tag name
      color:
        type: enum
        values: [red, orange, yellow, green, blue, purple, gray]

defaults:
  tags:
    - name: productivity
      color: blue
    - name: research
      color: purple
    - name: personal
      color: green
    - name: work
      color: orange

  notes:
    - title: Welcome to Your Knowledge Base
      type: general
      status: published
      pinned: true
      tagIds: ["$ref:tags[0]"]
      content: |
        ## Getting Started

        This is your personal knowledge base. Every piece of knowledge lives here as a **note** — whether it's a daily journal, meeting notes, a book review, or research findings.

        ### How It Works

        - **Notes** are the core unit. Each note has a `type` that hints at its purpose, but you're free to structure content however you like.
        - **Tags** help you organize and filter. Assign as many as you need.
        - **Links** connect notes together, building a web of knowledge over time.
        - **Markdown** is the language — use headings, lists, code blocks, quotes, and more.

        ### Note Types

        | Type | Best for |
        |------|----------|
        | daily | Journal entries, daily priorities, reflections |
        | meeting | Meeting notes, agendas, action items |
        | project | Project plans, goals, task tracking |
        | book | Book reviews, key takeaways, quotes |
        | article | Article summaries, commentary |
        | research | Research findings, paper notes, citations |
        | reference | How-tos, cheat sheets, reference material |
        | general | Everything else |

        ### Tips

        - Use the `summary` field for a quick TL;DR visible in card view
        - Pin important notes so they stay at the top
        - Link related notes to build your knowledge graph
      summary: An introduction to your knowledge base and how to use different note types.

